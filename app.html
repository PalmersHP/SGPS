<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sombrear — Sistema de Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --verde:#9ACD32;--verde-d:#6FAE2E;--verde-dark:#4a7a1e;
  --sb:#162032;--sb-hover:#1e2d42;--sb-active:rgba(154,205,50,.13);
  --bg:#f0f4f8;--card:#fff;--cinza:#5A5A5A;--border:#e2e8f0;
  --shadow:0 1px 8px rgba(0,0,0,.08);--shadow-md:0 4px 20px rgba(0,0,0,.1);
  --radius:10px;--sb-width:240px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--cinza);display:flex;height:100vh;overflow:hidden}

/* ══ SIDEBAR ══ */
#sidebar{width:var(--sb-width);background:var(--sb);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;z-index:200;transition:transform .3s;overflow-y:auto}
.sb-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo img{height:38px;filter:brightness(0) invert(1);display:block}
.sb-logo-txt{color:#9ACD32;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.sb-section{padding:16px 12px 6px;font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.5px}
.sb-nav{flex:1;padding:0 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.6);font-size:13px;font-weight:500;transition:all .2s;margin-bottom:2px;text-decoration:none;position:relative}
.nav-item:hover{background:var(--sb-hover);color:#fff}
.nav-item.active{background:var(--sb-active);color:var(--verde)}
.nav-item .ni-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;margin-left:auto}
.sb-footer{padding:12px 12px 16px;border-top:1px solid rgba(255,255,255,.07);margin-top:auto}
.user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,.05)}
.user-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--verde),var(--verde-d));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:10px;color:rgba(255,255,255,.4)}
.logout-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.4);font-size:16px;padding:4px;transition:color .2s}
.logout-btn:hover{color:#ef4444}

/* ══ MAIN ══ */
#main{margin-left:var(--sb-width);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:margin .3s}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--shadow)}
.tb-left{display:flex;align-items:center;gap:14px}
.tb-toggle{background:none;border:none;cursor:pointer;font-size:20px;color:#64748b;padding:4px}
.tb-title{font-size:15px;font-weight:600;color:#1e293b}
.tb-right{display:flex;align-items:center;gap:12px}
.notif-btn{position:relative;background:none;border:none;cursor:pointer;font-size:20px;color:#64748b;padding:6px}
.notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:#ef4444;border:2px solid #fff}
.tb-user{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;cursor:pointer;transition:background .2s}
.tb-user:hover{background:var(--bg)}
.tb-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--verde),var(--verde-d));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.tb-name{font-size:13px;font-weight:600;color:#334155}

/* ══ CONTENT ══ */
#content{flex:1;overflow-y:auto;padding:24px}
.view{display:none}
.view.active{display:block}

/* ══ PAGE HEADER ══ */
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-hdr h1{font-size:20px;font-weight:700;color:#1e293b}
.page-hdr p{font-size:13px;color:#64748b;margin-top:2px}

/* ══ CARDS ══ */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px}
.card-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-hdr h2{font-size:14px;font-weight:600;color:#1e293b}
.card-body{padding:20px}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:20px}
.kpi{background:var(--card);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);border-top:3px solid var(--verde);position:relative;overflow:hidden}
.kpi::after{content:attr(data-icon);position:absolute;right:14px;top:14px;font-size:28px;opacity:.15}
.kpi-label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.kpi-val{font-size:30px;font-weight:700;color:#1e293b;line-height:1.2;margin:6px 0 4px}
.kpi-sub{font-size:12px;color:#94a3b8}

/* STATUS BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.7}
.s-rascunho{background:#f1f5f9;color:#64748b}
.s-aguardando{background:#fffbeb;color:#d97706}
.s-aprovado{background:#eff6ff;color:#2563eb}
.s-em_fabricacao{background:#faf5ff;color:#7c3aed}
.s-pronto_envio{background:#ecfeff;color:#0891b2}
.s-em_transito{background:#fff7ed;color:#ea580c}
.s-entregue{background:#f0fdf4;color:#16a34a}
.s-concluido{background:#052e16;color:#86efac}
.s-inativo{background:#f1f5f9;color:#94a3b8;text-decoration:line-through}

/* TABLES */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#f8fafc;padding:9px 12px;text-align:left;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border);white-space:nowrap}
tbody td{padding:11px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tbody tr:hover{background:#f8fafc}
tbody tr:last-child td{border-bottom:none}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Poppins',sans-serif;transition:all .2s;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--verde),var(--verde-d));color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(154,205,50,.35)}
.btn-outline{background:#fff;color:var(--verde-d);border:2px solid var(--verde)}
.btn-outline:hover{background:var(--verde);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.btn-danger:hover{background:#dc2626;color:#fff}
.btn-ghost{background:transparent;color:#64748b;border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
.btn-approve{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.btn-approve:hover{background:#16a34a;color:#fff}

/* FORMS */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{padding:9px 13px;border:2px solid var(--border);border-radius:7px;font-size:13px;font-family:'Poppins',sans-serif;color:#1e293b;background:#fff;transition:border-color .2s;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--verde);box-shadow:0 0 0 3px rgba(154,205,50,.12)}
.fg textarea{resize:vertical;min-height:70px}

/* WIZARD */
.wizard-steps{display:flex;align-items:center;margin-bottom:28px;background:#fff;padding:16px 24px;border-radius:var(--radius);box-shadow:var(--shadow)}
.wz-step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;position:relative}
.wz-step::after{content:'';position:absolute;top:15px;left:50%;width:100%;height:2px;background:var(--border);z-index:0}
.wz-step:last-child::after{display:none}
.wz-num{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#fff;color:#94a3b8;position:relative;z-index:1}
.wz-step.done .wz-num{background:var(--verde);border-color:var(--verde);color:#fff}
.wz-step.active .wz-num{border-color:var(--verde);color:var(--verde-d);background:#f0fae0}
.wz-lbl{font-size:11px;color:#94a3b8;font-weight:500;white-space:nowrap}
.wz-step.active .wz-lbl,.wz-step.done .wz-lbl{color:var(--verde-d)}
.wz-panel{display:none}
.wz-panel.active{display:block}

/* MODULE GROUPS */
/* TIPO SELECTOR */
.tipo-selector-label{font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.tipo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px}
.tipo-card{border:2px solid #e2e8f0;border-radius:10px;padding:14px 10px;cursor:pointer;text-align:center;background:#fff;transition:all .2s;position:relative;user-select:none}
.tipo-card:hover{border-color:#9ACD32;background:#f7fdf0;transform:translateY(-1px);box-shadow:0 4px 12px rgba(154,205,50,.15)}
.tipo-card.active{border-color:#9ACD32;background:#f0fae0;box-shadow:0 0 0 3px rgba(154,205,50,.15)}
.tipo-card .tipo-icon{font-size:26px;display:block;margin-bottom:6px}
.tipo-card .tipo-label{font-size:13px;font-weight:700;color:#1e293b}
.tipo-card .tipo-sub{font-size:10px;color:#94a3b8;margin-top:2px;line-height:1.3}
.tipo-card.active .tipo-label{color:#6FAE2E}
.tipo-card .tipo-check{position:absolute;top:7px;right:9px;font-size:11px;color:#9ACD32;font-weight:700;background:#fff;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;border:1.5px solid #9ACD32}
.tipo-divider{height:1px;background:#e2e8f0;margin:16px 0}
/* EM BREVE */
.em-breve-box{text-align:center;padding:40px 20px;background:linear-gradient(135deg,#f8fafc,#f1f5f9);border:2px dashed #cbd5e1;border-radius:12px}
.em-breve-icon{font-size:48px;display:block;margin-bottom:12px}
.em-breve-title{font-size:18px;font-weight:700;color:#334155;margin-bottom:8px}
.em-breve-desc{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
.em-breve-badge{display:inline-block;background:#fef3c7;color:#92400e;font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;border:1px solid #fde68a;letter-spacing:.5px}
.mod-group{background:#f8fafc;border-radius:8px;padding:14px;border-left:3px solid var(--verde)}
.mod-group h4{font-size:11px;font-weight:700;color:var(--verde-d);text-transform:uppercase;margin-bottom:10px;letter-spacing:.4px}
.calc-summary{background:linear-gradient(135deg,#f0fae0,#e8f5cc);border:1px solid #c6e870;border-radius:8px;padding:14px 16px;margin-top:16px}
.calc-summary h4{font-size:12px;font-weight:700;color:var(--verde-d);margin-bottom:10px}
.calc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
.calc-item{text-align:center;background:#fff;border-radius:6px;padding:8px}
.calc-item .cv{font-size:20px;font-weight:700;color:var(--verde-d)}
.calc-item .cl{font-size:10px;color:#64748b;text-transform:uppercase}

/* GESTOR BANNER */
.gestor-banner{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#f0fae0,#e8f5cc);border:1px solid #c6e870;border-radius:10px;padding:14px 18px;margin-bottom:20px}
.gestor-banner-icon{font-size:26px;flex-shrink:0}
.gestor-banner-label{font-size:10px;font-weight:700;color:#6FAE2E;text-transform:uppercase;letter-spacing:.5px}
.gestor-banner-nome{font-size:15px;font-weight:700;color:#1e293b;margin-top:1px}
.gestor-banner-filial{margin-left:auto;font-size:11px;color:#64748b;text-align:right;white-space:nowrap}

/* DIRECTIVE CHIPS */
.dir-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.dir-card{background:#f8fafc;border:2px solid var(--border);border-radius:9px;padding:14px}
.dir-card label{font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:8px}
.dir-card select{width:100%;padding:9px 12px;border:2px solid var(--border);border-radius:7px;font-size:13px;font-family:'Poppins',sans-serif;color:#1e293b;background:#fff}
.dir-card select:focus{outline:none;border-color:var(--verde)}
.dir-note{margin-top:8px}

/* REVIEW TABLE */
.rev-tbl input[type="number"]{width:70px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;text-align:center;font-family:'Poppins',sans-serif}
.rev-tbl input[type="number"]:focus{outline:none;border-color:var(--verde)}
.prazo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}
.prazo-row{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;border:1px solid var(--border);border-radius:7px;padding:10px 14px}
.prazo-label{font-size:12px;font-weight:600;color:#334155}
.prazo-select{padding:5px 10px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-family:'Poppins',sans-serif;background:#fff}
.prazo-select:focus{outline:none;border-color:var(--verde)}

/* TIMELINE */
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:9px;top:4px;bottom:4px;width:2px;background:var(--border)}
.tl-item{position:relative;padding-bottom:20px}
.tl-item:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-24px;top:3px;width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:8px}
.tl-item.done .tl-dot{background:var(--verde);border-color:var(--verde);color:#fff}
.tl-item.current .tl-dot{background:#fff;border-color:var(--verde);box-shadow:0 0 0 3px rgba(154,205,50,.2)}
.tl-title{font-size:13px;font-weight:600;color:#1e293b}
.tl-sub{font-size:11px;color:#94a3b8;margin-top:2px}

/* SECTION DIVIDERS */
.sec-title{font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* FILTER TABS */
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.ftab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid var(--border);background:#fff;color:#64748b;transition:all .2s}
.ftab:hover{border-color:var(--verde);color:var(--verde-d)}
.ftab.active{background:var(--verde);border-color:var(--verde);color:#fff}

/* CHART CONTAINERS */
.chart-wrap{position:relative;height:240px}

/* APPROVAL BOX */
.apv-box{border-radius:9px;padding:16px 18px;margin-bottom:16px}
.apv-pending{background:#fffbeb;border:1px solid #fde68a}
.apv-info{background:#eff6ff;border:1px solid #bfdbfe}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0}
.info-row{display:flex;padding:9px 0;border-bottom:1px solid #f1f5f9}
.info-row:last-child{border-bottom:none}
.info-key{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;width:140px;flex-shrink:0}
.info-val{font-size:13px;color:#1e293b}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:9px;font-size:13px;font-weight:500;box-shadow:var(--shadow-md);z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;max-width:320px}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{background:#16a34a}
#toast.error{background:#dc2626}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;display:none}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;box-shadow:var(--shadow-md);width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h3{font-size:15px;font-weight:700;color:#1e293b}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:#94a3b8}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

/* PRINT */
#printArea{display:none}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body>*{display:none!important}
  #printArea{display:block!important;font-family:Arial,sans-serif;color:#333;padding:20mm 18mm}
  .pr-hdr table{width:100%;border-collapse:collapse}
  .pr-logo{height:40px}
  .pr-main-title{font-size:14pt;font-weight:700;color:#9ACD32;text-transform:uppercase;letter-spacing:1px}
  .pr-line{height:3px;background:#9ACD32;margin:8px 0 16px;border-radius:2px}
  .pr-sec{font-size:9pt;font-weight:700;color:#6FAE2E;text-transform:uppercase;letter-spacing:.8px;border-left:4px solid #9ACD32;padding-left:7px;margin:14px 0 8px}
  table{width:100%;border-collapse:collapse;font-size:8.5pt}
  th{background:#9ACD32!important;color:#fff!important;padding:5px 8px;text-align:left}
  td{padding:5px 8px;border-bottom:1px solid #ddd}
  tr:nth-child(even) td{background:#f5f5f5!important}
  .pr-total td{background:#6FAE2E!important;color:#fff!important;font-weight:700;font-size:10pt}
  .pr-sign{border-top:1.5px solid #333;padding-top:5px;width:220px;display:inline-block;text-align:center;font-size:8.5pt}
  .pr-sign-wrap{margin-top:32px;display:flex;justify-content:space-around}
}

/* RESPONSIVE */
@media(max-width:900px){
  :root{--sb-width:0px}
  #sidebar{transform:translateX(-240px)}
  #sidebar.open{transform:translateX(0);width:240px}
  #main{margin-left:0}
}
</style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<nav id="sidebar">
  <div class="sb-logo">
    <img src="logo.png" alt="Sombrear" onerror="this.style.display='none'">
    <div class="sb-logo-txt">Sistema de Pedidos</div>
  </div>
  <div class="sb-nav" id="sbNav"></div>
  <div class="sb-footer">
    <div class="user-card">
      <div class="user-av" id="userAv">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">—</div>
        <div class="user-role" id="userRole">—</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="Sair">⏻</button>
    </div>
  </div>
</nav>

<!-- ══ MAIN ══ -->
<div id="main">
  <header class="topbar">
    <div class="tb-left">
      <button class="tb-toggle" onclick="toggleSidebar()">☰</button>
      <span class="tb-title" id="pageTitle">Dashboard</span>
    </div>
    <div class="tb-right">
      <button class="notif-btn" id="notifBtn" title="Notificações">🔔<span class="notif-dot" id="notifDot" style="display:none"></span></button>
      <div class="tb-user" onclick="editarPerfil()" title="Editar perfil" style="cursor:pointer">
        <div class="tb-av" id="tbAv">?</div>
        <span class="tb-name" id="tbName">—</span>
        <span style="font-size:11px;color:#94a3b8;margin-left:2px">✏️</span>
      </div>

function supaGet(k){
  return fetch(SUPA_URL+'/rest/v1/sgps_store?key=eq.'+k+'&select=value',{headers:SUPA_HDR})
    .then(function(r){return r.json();})
    .then(function(rows){return rows&&rows.length?rows[0].value:null;})
    .catch(function(){return null;});
}
function supaSet(k,v){
  return fetch(SUPA_URL+'/rest/v1/sgps_store',{
    method:'POST',
    headers:Object.assign({},SUPA_HDR,{'Prefer':'resolution=merge-duplicates'}),
    body:JSON.stringify({key:k,value:v,updated_at:new Date().toISOString()})
  }).catch(function(e){console.warn('supaSet error',e);});
}

// DB (Supabase + cache em memória)
// ════════════════════════════════════════════
var DB_CACHE={filiais:[],pedidos:[],usuarios:[],catalogo:[]};
var DB = {
  init:function(){
    var tables=['filiais','pedidos','usuarios','catalogo'];
    return Promise.all(tables.map(function(t){
      return supaGet(t).then(function(d){
        if(d&&d.length){
          DB_CACHE[t]=d; // dados existentes no Supabase
        } else {
          // Primeira vez ou tabela vazia — sobe o seed
          DB_CACHE[t]=SEED[t]||[];
          if(DB_CACHE[t].length) supaSet(t,DB_CACHE[t]);
        }
      });
    }));
  },
  get:function(k){return DB_CACHE[k]||[];},
  set:function(k,v){DB_CACHE[k]=v;supaSet(k,v);},
  pedidos:function(){return this.get('pedidos');},
  savePedidos:function(p){this.set('pedidos',p);},
  filiais:function(){return this.get('filiais');},
  saveFiliais:function(f){this.set('filiais',f);},
  usuarios:function(){return this.get('usuarios');},
  saveUsuarios:function(u){this.set('usuarios',u);},
  catalogo:function(){return this.get('catalogo');},
  saveCatalogo:function(c){this.set('catalogo',c);},
  addPedido:function(p){var arr=this.pedidos();arr.unshift(p);this.savePedidos(arr);},
  updatePedido:function(id,upd){
    var arr=this.pedidos().map(function(p){
      if(p.id===id){Object.assign(p,upd);p.atualizado=hoje();}
      return p;
    });
    this.savePedidos(arr);
  },
  getPedido:function(id){return this.pedidos().find(function(p){return p.id===id;});}
};

  if(!hash)hash=USER.role==='sede'?'sede-dashboard':'filial-dashboard';
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  var view=document.getElementById('view-'+hash);
  if(!view){hash=USER.role==='sede'?'sede-dashboard':'filial-dashboard';view=document.getElementById('view-'+hash);}
  if(view)view.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(function(n){
    n.classList.toggle('active',n.getAttribute('data-hash')===hash);
  });
  var routes=USER.role==='sede'?ROUTES_SEDE:ROUTES_FILIAL;
  var route=routes.find(function(r){return r.hash===hash;})||{title:''};
  document.getElementById('pageTitle').textContent=route.title;
  renderView(hash);
}

function renderView(hash){
  if(hash==='filial-dashboard')renderFilialDash();
  else if(hash==='filial-novo-pedido')renderNovoPedido();
  else if(hash==='filial-pedidos')renderMeusPedidos();
  else if(hash==='filial-relatorios')renderRelatorios('filial');
  else if(hash==='sede-dashboard')renderSedeDash();
  else if(hash==='sede-pedidos')renderSedePedidos();
  else if(hash==='sede-aprovacoes')renderAprovacoes();
  else if(hash==='sede-filiais')renderFiliais();
  else if(hash==='sede-catalogo')renderCatalogo('sede');
  else if(hash==='filial-precos')renderCatalogo('filial');
  else if(hash==='sede-usuarios')renderUsuarios('sede');
  else if(hash==='filial-equipe')renderUsuarios('filial');
  else if(hash==='sede-relatorios')renderRelatorios('sede');
}

function renderCalcSummary(c){
  if(!c.modTotal)return'<h4 style="color:#94a3b8">Insira os módulos para ver o cálculo.</h4>';
  return'<h4>📐 Resumo Calculado</h4><div class="calc-grid">'+
    '<div class="calc-item"><div class="cv">'+c.modTotal+'</div><div class="cl">Módulos</div></div>'+
    '<div class="calc-item"><div class="cv">'+c.qtdPes+'</div><div class="cl">Pés</div></div>'+
    '<div class="calc-item"><div class="cv">'+c.qtdBracos+'</div><div class="cl">Braços</div></div>'+
    '<div class="calc-item"><div class="cv">'+(c.mod2v*4+c.mod3v*4)+'</div><div class="cl">Arcos</div></div>'+
    '<div class="calc-item"><div class="cv">'+(c.mod2v*2+c.mod3v*2)+'</div><div class="cl">Estrelas</div></div>'+
    '<div class="calc-item"><div class="cv">'+(WZ.dim.vagas||0)*12.5+'</div><div class="cl">Área m²</div></div>'+
  '</div>';
}

function calcularPecas(d){
  var mod2vMA=d.mod2vMA||0,mod3vMA=d.mod3vMA||0,mod2vMT=d.mod2vMT||0,mod3vMT=d.mod3vMT||0;
  var modMA=mod2vMA+mod3vMA,modMT=mod2vMT+mod3vMT,modTotal=modMA+modMT;
  var mod2v=mod2vMA+mod2vMT,mod3v=mod3vMA+mod3vMT;
  var align=d.semParam?Math.max(1,Math.ceil(modTotal/4)):Math.max(1,d.align||1);
  var qtdPes=modTotal+align,qtdBracos=modTotal+align;
  var ratioMT=modTotal>0?modMT/modTotal:0;
  return{modTotal:modTotal,mod2v:mod2v,mod3v:mod3v,qtdPes:qtdPes,qtdBracos:qtdBracos,pesMA:Math.round(qtdPes*(1-ratioMT)),pesMT:Math.round(qtdPes*ratioMT),align:align};
}

function wzCalc(){
  WZ.dim.vagas=parseInt(document.getElementById('w_vagas').value)||0;
  WZ.dim.mod2vMA=parseInt(document.getElementById('w_m2ma').value)||0;
  WZ.dim.mod3vMA=parseInt(document.getElementById('w_m3ma').value)||0;
  WZ.dim.mod2vMT=parseInt(document.getElementById('w_m2mt').value)||0;
  WZ.dim.mod3vMT=parseInt(document.getElementById('w_m3mt').value)||0;
  WZ.dim.align=parseInt(document.getElementById('w_align').value)||1;
  var calc=calcularPecas(WZ.dim);
  document.getElementById('wzCalcBox').innerHTML=renderCalcSummary(calc);
}

function wzToggleAlign(){
  WZ.dim.semParam=document.getElementById('w_semParam').checked;
  var inp=document.getElementById('w_align');
  inp.disabled=WZ.dim.semParam;inp.style.opacity=WZ.dim.semParam?'.4':'1';
  wzCalc();
}

function wzSugerir(){
  var vagas=parseInt(document.getElementById('w_vagas').value)||0;
  if(!vagas){showToast('Informe a quantidade de vagas primeiro.','error');return;}
  var tot=Math.round(vagas/2.5);
  var m2v=Math.round(tot*.2),m3v=tot-m2v;
  document.getElementById('w_m2ma').value=m2v;
  document.getElementById('w_m3ma').value=m3v;
  document.getElementById('w_m2mt').value=0;
  document.getElementById('w_m3mt').value=0;
  WZ.dim.mod2vMA=m2v;WZ.dim.mod3vMA=m3v;WZ.dim.mod2vMT=0;WZ.dim.mod3vMT=0;
  wzCalc();
}

function wzNext(){
  if(WZ.step===1){
    var nome=document.getElementById('w_cliente').value.trim();
    if(!nome){showToast('Informe o nome do condomínio.','error');return;}
    WZ.cliente={nome:nome,cnpj:document.getElementById('w_cnpj').value,end:document.getElementById('w_end').value,tel:document.getElementById('w_tel').value,sindico:document.getElementById('w_sindico').value,email:document.getElementById('w_email').value};
  }
  if(WZ.step===2){
    var tipo=WZ.dim.tipo||'Sombrite';
    if(tipo==='Sombrite'){
      wzCalc();
      if(!WZ.dim.vagas){showToast('Informe a quantidade de vagas.','error');return;}
      var d=WZ.dim,calc=calcularPecas(d);
      WZ.itens=gerarItens(d.vagas,d.mod2vMA,d.mod3vMA,d.mod2vMT,d.mod3vMT,calc.align,1);
    } else {
      WZ.itens=[];
    }
  }
  if(WZ.step===3){
    WZ.dir={estrutura:document.getElementById('w_estrutura').value,tela:document.getElementById('w_tela').value,chumb:document.getElementById('w_chumb').value,pilares:document.getElementById('w_pilares').value};
  }
  WZ.step++;
  renderWizard();
}

function aprovarPedido(id){
  var p=DB.getPedido(id);
  p.log.push({status:'aprovado',data:hoje(),user:USER.nome});
  p.log.push({status:'em_fabricacao',data:hoje(),user:USER.nome});
  DB.updatePedido(id,{status:'em_fabricacao',log:p.log});
  buildSidebar();showToast('Pedido aprovado! Em fabricação.','success');
  renderAprovacoes();
}

function devolverPedido(id){
  openModal('Devolver Pedido',
    '<div class="fg"><label>Motivo da devolução <span style="color:#ef4444">*</span></label>'+
    '<textarea id="obsDevolver" rows="4" placeholder="Descreva o motivo da devolução (obrigatório)..." style="border:2px solid #e2e8f0"></textarea>'+
    '<div id="obsErr" style="color:#ef4444;font-size:12px;margin-top:4px;display:none">⚠️ Informe o motivo antes de devolver.</div></div>',

    '<button class="btn btn-danger" onclick="confirmarDevolucao(\''+id+'\')">↩ Confirmar Devolução</button>'
  );
}

function confirmarDevolucao(id){
  var obs=(document.getElementById('obsDevolver').value||'').trim();
  if(!obs){
    document.getElementById('obsErr').style.display='block';
    document.getElementById('obsDevolver').style.borderColor='#ef4444';
    return;
  }
  var p=DB.getPedido(id);
  p.log.push({status:'rascunho',data:hoje(),user:USER.nome,obs:obs});
  DB.updatePedido(id,{status:'rascunho',obs:obs,log:p.log});
  closeModal();buildSidebar();showToast('Pedido devolvido à filial.','');
  if(location.hash==='#sede-aprovacoes')renderAprovacoes();else renderView_sedePedido();
}

  );

function salvarEdicaoAprovacao(id,n){
  var p=DB.getPedido(id);
  if(!p)return;
  var novosItens=[];
  for(var i=0;i<n;i++){
    var desc=document.getElementById('ei_desc_'+i);
    var qtd=document.getElementById('ei_qtd_'+i);
    if(!desc||!qtd)continue;
    novosItens.push({
      desc:desc.value.trim(),
      ma:(document.getElementById('ei_ma_'+i)||{}).value||'',
      mb:(document.getElementById('ei_mb_'+i)||{}).value||'',
      mc:(document.getElementById('ei_mc_'+i)||{}).value||'',
      un:(document.getElementById('ei_un_'+i)||{}).value||'',
      qtd:parseInt(qtd.value)||0
    });
  }
  p.log.push({status:'aguardando',data:hoje(),user:USER.nome,obs:'Editado pela Sede antes da aprovação'});
  DB.updatePedido(id,{itens:novosItens,log:p.log});
  closeModal();
  showToast('Pedido atualizado. Pronto para aprovar ou devolver.','success');
  renderView_sedePedido();
}

function avancarStatus(id,novoStatus){
  var p=DB.getPedido(id);
  p.log.push({status:novoStatus,data:hoje(),user:USER.nome});
  DB.updatePedido(id,{status:novoStatus,log:p.log});
  buildSidebar();showToast('Status atualizado: '+STATUS_LABELS[novoStatus],'success');
  renderView_sedePedido();
}

function inativarPedido(id,role){
  if(!confirm('Inativar este pedido? Ele ficará na área de inativos e poderá ser reativado.'))return;
  DB.updatePedido(id,{inativo:true});
  showToast('Pedido inativado.','');
  if(role==='filial')renderMeusPedidos();else renderSedePedidos();
}

function reativarPedido(id,role){
  DB.updatePedido(id,{inativo:false});
  showToast('Pedido reativado.','success');
  if(role==='filial')renderMeusPedidos();else renderSedePedidos();
}

function salvarFilial(){
  var nome=document.getElementById('nf_nome').value.trim();
  if(!nome){showToast('Informe o nome da filial.','error');return;}
  var fils=DB.filiais();
  var gestor=document.getElementById('nf_gestor').value.trim();
  if(!gestor){showToast('Informe o nome do gestor.','error');return;}
  fils.push({id:'f'+Date.now(),nome:nome,cidade:document.getElementById('nf_cidade').value,gestor:gestor,cnpj:document.getElementById('nf_cnpj').value,email:document.getElementById('nf_email').value,telefone:document.getElementById('nf_tel').value,frete:parseFloat(document.getElementById('nf_frete').value)||0,ativo:true});

  closeModal();showToast('Filial cadastrada com sucesso!','success');
  renderFiliais();
}

function salvarEdicaoFilial(id){
  var nome=document.getElementById('ef_nome').value.trim();
  var gestor=document.getElementById('ef_gestor').value.trim();
  if(!nome){showToast('Informe o nome.','error');return;}
  if(!gestor){showToast('Informe o gestor.','error');return;}
  var fils=DB.filiais().map(function(f){
    if(f.id!==id)return f;
    return Object.assign({},f,{
      nome:nome,cidade:document.getElementById('ef_cidade').value,
      gestor:gestor,cnpj:document.getElementById('ef_cnpj').value,
      email:document.getElementById('ef_email').value,
      telefone:document.getElementById('ef_tel').value,
      frete:parseFloat(document.getElementById('ef_frete').value)||0,
      ativo:document.getElementById('ef_ativo').value==='1'
    });
  });
  DB.saveFiliais(fils);
  buildSidebar();
  closeModal();showToast('Filial atualizada.','success');
  navigate(location.hash.replace('#','')||'');
}

function excluirFilial(id,nome){
  if(!confirm('Excluir a filial "'+nome+'"? Esta ação não pode ser desfeita.'))return;
  DB.saveFiliais(DB.filiais().filter(function(f){return f.id!==id;}));
  showToast('Filial excluída.','success');renderFiliais();
}

function editarPerfil(){
  openModal('Editar Perfil',
    '<div class="form-grid">'+
    '<div class="fg" style="grid-column:1/-1"><label>Nome completo *</label><input id="ep_nome" value="'+esc(USER.nome)+'"></div>'+

}

function salvarPerfil(){
  var nome=document.getElementById('ep_nome').value.trim();
  if(!nome){showToast('Informe o nome.','error');return;}
  var cargo=document.getElementById('ep_cargo').value.trim();
  USER.nome=nome; USER.cargo=cargo;
  // Salva no DB de usuários
  var users=DB.usuarios().map(function(u){
    return u.id===USER.id?Object.assign({},u,{nome:nome,cargo:cargo}):u;
  });
  DB.saveUsuarios(users);
  localStorage.setItem('sombrear_session',JSON.stringify(USER));
  closeModal();showToast('Perfil atualizado.','success');
  buildSidebar();

function lookupPreco(desc){
  var item=DB.catalogo().find(function(c){return c.desc===desc;});
  return item?item.preco:0;
}
function calcTotalPedido(itens,frete){
  var sub=itens.reduce(function(s,it){return s+(lookupPreco(it.desc)*(it.qtd||0));},0);
  return {subtotal:sub,frete:frete||0,total:sub+(frete||0)};
}

function salvarPreco(id,val){
  var v=parseFloat(val)||0;
  var cat=DB.catalogo().map(function(c){return c.id===id?Object.assign({},c,{preco:v}):c;});
  DB.saveCatalogo(cat);
  showToast('Preço atualizado.','success');
}

function salvarFrete(filialId,val){
  var v=parseFloat(val)||0;
  var fils=DB.filiais().map(function(f){return f.id===filialId?Object.assign({},f,{frete:v}):f;});
  DB.saveFiliais(fils);
  showToast('Frete atualizado.','success');
}

function editarItemCatalogo(id){
  var cat=DB.catalogo();
  var c=cat.find(function(x){return x.id===id;});
  if(!c)return;
  var cats=cat.map(function(x){return x.cat;}).filter(function(v,i,a){return a.indexOf(v)===i;});
  var catOpts=cats.map(function(ct){return'<option'+(ct===c.cat?' selected':'')+'>'+esc(ct)+'</option>';}).join('');
  openModal('Editar Item — '+esc(c.desc),
    '<div class="form-grid">'+
    '<div class="fg" style="grid-column:1/-1"><label>Descrição *</label><input id="ec_desc" value="'+esc(c.desc)+'"></div>'+
    '<div class="fg"><label>Unidade</label><input id="ec_un" value="'+esc(c.un)+'"></div>'+
    '<div class="fg"><label>Preço Unit. (R$)</label><input type="number" id="ec_preco" min="0" step="0.01" value="'+c.preco.toFixed(2)+'"></div>'+
    '<div class="fg" style="grid-column:1/-1"><label>Categoria</label><input id="ec_cat" list="ec_cat_list" value="'+esc(c.cat)+'"><datalist id="ec_cat_list">'+catOpts+'</datalist></div>'+
    '</div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'+
    '<button class="btn btn-primary" onclick="salvarEdicaoItemCatalogo(\''+id+'\')">Salvar Alterações</button>'
  );
}

function salvarEdicaoItemCatalogo(id){
  var desc=(document.getElementById('ec_desc').value||'').trim();
  if(!desc){showToast('Informe a descrição.','error');return;}
  var cat=DB.catalogo().map(function(c){
    if(c.id!==id)return c;
    return Object.assign({},c,{
      desc:desc,
      un:(document.getElementById('ec_un').value||'').trim(),
      preco:parseFloat(document.getElementById('ec_preco').value)||0,
      cat:(document.getElementById('ec_cat').value||'').trim()||c.cat
    });
  });
  DB.saveCatalogo(cat);
  closeModal();showToast('Item atualizado.','success');
  renderCatalogo('sede');
}

function excluirItemCatalogo(id,desc){
  if(!confirm('Excluir "'+desc+'" do catálogo?'))return;
  DB.saveCatalogo(DB.catalogo().filter(function(c){return c.id!==id;}));
  showToast('Item excluído.','success');
  renderCatalogo('sede');
}

function toggleFilialSelect(){

  var w=document.getElementById('nu_filial_wrap');
  if(r&&w)w.style.display=r.value==='filial'?'':'none';
}

function salvarNovoUsuario(ctxRole){
  var nome=document.getElementById('nu_nome').value.trim();
  var email=document.getElementById('nu_email').value.trim().toLowerCase();
  var senha=document.getElementById('nu_senha').value;
  var senha2=document.getElementById('nu_senha2').value;
  var cargo=document.getElementById('nu_cargo').value.trim();
  var roleEl=document.getElementById('nu_role');
  var userRole=roleEl?roleEl.value:'filial';
  if(!nome){showToast('Informe o nome.','error');return;}
  if(!email||!email.includes('@')){showToast('Informe um e-mail válido.','error');return;}
  if(senha.length<6){showToast('Senha deve ter ao menos 6 caracteres.','error');return;}
  if(senha!==senha2){showToast('As senhas não conferem.','error');return;}
  var users=DB.usuarios();
  if(users.find(function(u){return u.email===email;})){showToast('E-mail já cadastrado.','error');return;}
  var filial_id='',filial_nome='';
  if(userRole==='filial'){
    var filialEl=document.getElementById('nu_filial');
    var parts=filialEl?filialEl.value.split('|'):[];
    filial_id=parts[0]||USER.filial_id||'';
    filial_nome=parts[1]||USER.filial_nome||'';
  }
  users.push({id:'u'+Date.now(),email:email,senha:senha,role:userRole,nome:nome,cargo:cargo,filial_id:filial_id,filial_nome:filial_nome,ativo:true});
  DB.saveUsuarios(users);
  closeModal();showToast('Usuário criado com sucesso!','success');
  renderUsuarios(ctxRole);
}

  var filiais=DB.filiais().filter(function(f){return f.ativo;});
  var filialOpts='<select id="eu_filial">'+
    filiais.map(function(f){return'<option value="'+f.id+'|'+esc(f.nome)+'"'+(f.id===u.filial_id?' selected':'')+'>'+esc(f.nome)+'</option>';}).join('')+
    '</select>';
  var isFilial=u.role==='filial';
  openModal('Editar Usuário',
    '<div class="form-grid">'+
    '<div class="fg"><label>Nome *</label><input id="eu_nome" value="'+esc(u.nome)+'"></div>'+
    '<div class="fg"><label>Cargo</label><input id="eu_cargo" value="'+esc(u.cargo||'')+'"></div>'+
    '<div class="fg" style="grid-column:1/-1"><label>E-mail *</label><input type="email" id="eu_email" value="'+esc(u.email)+'"></div>'+
    '<div class="fg"><label>Nova Senha <span style="font-size:10px;color:#94a3b8">(deixe em branco para manter)</span></label><input type="password" id="eu_senha" placeholder="Nova senha..."></div>'+
    (isFilial&&USER.role==='sede'?'<div class="fg"><label>Filial</label>'+filialOpts+'</div>':'')+
    '<div class="fg"><label>Status</label><select id="eu_ativo"><option value="1"'+(u.ativo?' selected':'')+'>Ativo</option><option value="0"'+(!u.ativo?' selected':'')+'>Inativo</option></select></div>'+
    '</div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'+
    '<button class="btn btn-primary" onclick="salvarEdicaoUsuario(\''+id+'\')">Salvar</button>'
  );
}

function salvarEdicaoUsuario(id){
  var nome=document.getElementById('eu_nome').value.trim();
  var email=document.getElementById('eu_email').value.trim().toLowerCase();
  var senha=document.getElementById('eu_senha').value;
  if(!nome){showToast('Informe o nome.','error');return;}
  if(senha&&senha.length<6){showToast('Senha deve ter ao menos 6 caracteres.','error');return;}
  var users=DB.usuarios().map(function(u){
    if(u.id!==id)return u;
    var upd={nome:nome,cargo:document.getElementById('eu_cargo').value.trim(),email:email,ativo:document.getElementById('eu_ativo').value==='1'};
    if(senha)upd.senha=senha;
    var filEl=document.getElementById('eu_filial');
    if(filEl){var parts=filEl.value.split('|');upd.filial_id=parts[0];upd.filial_nome=parts[1]||'';}
    return Object.assign({},u,upd);
  });
  DB.saveUsuarios(users);
  // Atualiza sessão se for o próprio usuário
  if(id===USER.id){
    var updated=users.find(function(u){return u.id===id;});
    USER=updated;localStorage.setItem('sombrear_session',JSON.stringify(USER));
    buildSidebar();
  }
  closeModal();showToast('Usuário atualizado.','success');
  navigate(location.hash.replace('#','')||'');
}

function excluirUsuario(id,nome){
  if(!confirm('Excluir o usuário "'+nome+'"?'))return;
  DB.saveUsuarios(DB.usuarios().filter(function(u){return u.id!==id;}));
  showToast('Usuário excluído.','success');
  navigate(location.hash.replace('#','')||'');
}

// ════════════════════════════════════════════
// VIEW: RELATÓRIOS
// ════════════════════════════════════════════
function renderRelatorios(role){
  var peds=DB.pedidos();
  if(role==='filial')peds=peds.filter(function(p){return p.filial_id===USER.filial_id;});
  var totalVagas=peds.reduce(function(s,p){return s+p.vagas;},0);
  var totalPeds=peds.length;
  var entregues=peds.filter(function(p){return p.status==='entregue';});
  var mediaVagas=totalPeds?Math.round(totalVagas/totalPeds):0;
  var vidId='view-'+(role==='sede'?'sede':'filial')+'-relatorios';

  document.getElementById(vidId).innerHTML=
  '<div class="page-hdr"><div><h1>Relatórios</h1><p>Análise de desempenho e volumes de pedidos.</p></div></div>'+
  '<div class="kpi-grid">'+
    '<div class="kpi" data-icon="🏗️"><div class="kpi-label">Total de Vagas no Ano</div><div class="kpi-val">'+totalVagas+'</div><div class="kpi-sub">todos os pedidos</div></div>'+
    '<div class="kpi" data-icon="📋"><div class="kpi-label">Total de Pedidos</div><div class="kpi-val">'+totalPeds+'</div><div class="kpi-sub">no período</div></div>'+
    '<div class="kpi" data-icon="📊"><div class="kpi-label">Média Vagas / Pedido</div><div class="kpi-val">'+mediaVagas+'</div><div class="kpi-sub">média histórica</div></div>'+
    '<div class="kpi" style="border-top-color:#16a34a" data-icon="✅"><div class="kpi-label">Pedidos Entregues</div><div class="kpi-val">'+entregues.length+'</div><div class="kpi-sub">ciclos encerrados</div></div>'+
  '</div>'+
  '<div style="display:grid;grid-template-columns:1.3fr 1fr;gap:20px;margin-bottom:20px">'+
    '<div class="card"><div class="card-hdr"><h2>Vagas por Mês — 2026</h2></div><div class="card-body"><div class="chart-wrap"><canvas id="chartRelMes"></canvas></div></div></div>'+
    '<div class="card"><div class="card-hdr"><h2>Sombrite vs Telha</h2></div><div class="card-body"><div class="chart-wrap"><canvas id="chartRelTipo"></canvas></div></div></div>'+
  '</div>'+
  '<div class="card"><div class="card-hdr"><h2>Histórico de Pedidos</h2></div><div class="card-body" style="padding:0">'+
  '<div class="tbl-wrap"><table><thead><tr><th>Mês</th>'+(role==='sede'?'<th>Filial</th>':'')+
  '<th>Condomínio</th><th>Vagas</th><th>Tipo</th><th>Status</th></tr></thead><tbody>'+
  peds.map(function(p){return'<tr><td>'+fmtDate(p.criado).substring(3)+'</td>'+(role==='sede'?'<td>'+p.filial_nome+'</td>':'')+'<td>'+p.cliente+'</td><td>'+p.vagas+'</td><td>'+p.tipo+'</td><td>'+badge(p.status)+'</td></tr>';}).join('')+
  '</tbody></table></div></div></div>';

  setTimeout(function(){
    var mes=document.getElementById('chartRelMes');
    if(mes){new Chart(mes,{type:'bar',data:{labels:['Jan','Fev','Mar','Abr','Mai','Jun'],datasets:[{label:'Vagas',data:[120,150,200,80,0,0],backgroundColor:'rgba(154,205,50,.75)',borderColor:'#9ACD32',borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,.04)'}},x:{grid:{display:false}}}}});}
    var tipo=document.getElementById('chartRelTipo');
    if(tipo){
      var sombrite=peds.filter(function(p){return p.tipo==='Sombrite';}).length;
      var telha=peds.filter(function(p){return p.tipo!=='Sombrite';}).length;
      new Chart(tipo,{type:'doughnut',data:{labels:['Sombrite','Telha'],datasets:[{data:[sombrite||5,telha||1],backgroundColor:['#9ACD32','#60a5fa'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}});
    }
  },100);
}

// ════════════════════════════════════════════
// EXCLUIR PEDIDO (admin sede + senha)
// ════════════════════════════════════════════
function excluirPedido(id,cliente){
  openModal('🗑️ Excluir Pedido',
    '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:14px 16px;margin-bottom:16px">'+
    '<p style="font-weight:700;color:#dc2626;margin-bottom:4px">⚠️ Ação irreversível</p>'+
    '<p style="font-size:13px;color:#7f1d1d">O pedido <strong>"'+esc(cliente)+'"</strong> será permanentemente excluído do sistema. Esta ação não pode ser desfeita.</p>'+
    '</div>'+
    '<div class="fg"><label>Confirme sua senha de administrador *</label>'+
    '<input type="password" id="del_senha" placeholder="Digite sua senha..." autocomplete="off">'+
    '<div id="del_err" style="color:#ef4444;font-size:12px;margin-top:4px;display:none">⚠️ Senha incorreta.</div></div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'+
    '<button class="btn btn-danger" onclick="confirmarExclusaoPedido(\''+id+'\')">Excluir definitivamente</button>'
  );
  setTimeout(function(){var el=document.getElementById('del_senha');if(el)el.focus();},100);
}

function confirmarExclusaoPedido(id){
  var senha=(document.getElementById('del_senha').value||'');
  var userDB=DB.usuarios().find(function(u){return u.id===USER.id;});
  var senhaCorreta=userDB?userDB.senha:'';
  if(!senha||senha!==senhaCorreta){
    document.getElementById('del_err').style.display='block';
    document.getElementById('del_senha').style.borderColor='#ef4444';
    document.getElementById('del_senha').focus();
    return;
  }
  DB.savePedidos(DB.pedidos().filter(function(p){return p.id!==id;}));
  closeModal();
  buildSidebar();
  showToast('Pedido excluído definitivamente.','');
  location.hash='sede-pedidos';
  renderSedePedidos();
}

// MODAL
// ════════════════════════════════════════════
function openModal(title,body,footer){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalFooter').innerHTML=footer||'';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

// HELPERS
// ════════════════════════════════════════════
function esc(s){return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// BOOT
// ════════════════════════════════════════════
// Extend renderView for detail pages
var _origRender=renderView;
renderView=function(hash){
  if(hash==='filial-pedido')renderView_filialPedido();
  else if(hash==='sede-pedido')renderView_sedePedido();
  else _origRender(hash);
};

window.addEventListener('hashchange',function(){
  navigate(location.hash.replace('#',''));
});

(function boot(){
  if(!initAuth())return;

  // Overlay de loading (não destrói as view divs)
  var ov=document.createElement('div');
  ov.id='bootOv';
  ov.style.cssText='position:fixed;inset:0;background:rgba(240,244,248,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999';
  ov.innerHTML='<div style="width:40px;height:40px;border:4px solid #e2e8f0;border-top-color:#9ACD32;border-radius:50%;animation:spin .8s linear infinite"></div>'+
    '<span style="font-size:14px;color:#64748b;font-family:Poppins,sans-serif">Conectando ao servidor...</span>';
  var ss=document.createElement('style');
  ss.textContent='@keyframes spin{to{transform:rotate(360deg)}}';
  document.head.appendChild(ss);
  document.body.appendChild(ov);

  DB.init().then(function(){
    var dbUser=DB.usuarios().find(function(u){return u.id===USER.id;});
    if(dbUser)USER=dbUser;
    buildSidebar();
    var startHash=location.hash.replace('#','')||'';
    navigate(startHash);
    document.getElementById('bootOv').remove();
  }).catch(function(e){
    console.error('Boot error:',e);
    document.getElementById('bootOv').innerHTML=
      '<div style="text-align:center;font-family:Poppins,sans-serif">'+
      '<div style="font-size:32px;margin-bottom:12px">⚠️</div>'+
      '<div style="font-size:15px;font-weight:600;color:#dc2626;margin-bottom:8px">Erro ao conectar ao servidor</div>'+
      '<div style="font-size:13px;color:#64748b;margin-bottom:20px">Verifique sua conexão e tente novamente.</div>'+
      '<button onclick="location.reload()" style="padding:10px 24px;background:#9ACD32;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:Poppins,sans-serif">↺ Recarregar</button></div>';
  });
}());
</script>
