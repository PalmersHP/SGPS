<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sombrear — Ecosistema</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --verde:#9ACD32;--verde-d:#6FAE2E;--verde-dark:#4a7a1e;
  --sb:#0d1117;--sb-border:rgba(255,255,255,.06);--sb-hover:rgba(255,255,255,.05);
  --bg:#f5f6fa;--card:#ffffff;--border:#e8eaed;
  --text:#111827;--text-2:#6b7280;--text-3:#9ca3af;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 20px rgba(0,0,0,.09);--sb-width:240px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);}

/* ══ LOGIN ══ */
#loginScreen{
  min-height:100vh;
  background:linear-gradient(145deg,#0a0e17 0%,#111827 60%,#0a0e17 100%);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
#loginScreen::before{
  content:'';position:absolute;
  width:700px;height:700px;
  background:radial-gradient(circle,rgba(154,205,50,.07) 0%,transparent 65%);
  top:-150px;right:-150px;border-radius:50%;
}
#loginScreen::after{
  content:'';position:absolute;
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(154,205,50,.04) 0%,transparent 65%);
  bottom:-100px;left:-100px;border-radius:50%;
}
.login-wrap{
  display:grid;grid-template-columns:1fr 1fr;
  min-height:100vh;width:100%;max-width:1100px;
  position:relative;z-index:1;
  margin:0 auto;
}
.login-left{
  display:flex;flex-direction:column;justify-content:center;
  padding:60px 64px;
}
.login-brand{
  display:flex;align-items:center;gap:12px;margin-bottom:48px;
}
.login-brand-mark{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--verde),var(--verde-d));
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.login-brand-name{font-size:18px;font-weight:700;color:#fff;}
.login-brand-sub{font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:2px;margin-top:1px;}
.login-hero-title{
  font-size:36px;font-weight:700;color:#fff;line-height:1.25;
  letter-spacing:-.5px;margin-bottom:14px;
}
.login-hero-title span{color:var(--verde);}
.login-hero-sub{font-size:14px;color:rgba(255,255,255,.4);line-height:1.7;max-width:340px;}
.login-modules{display:flex;flex-wrap:wrap;gap:8px;margin-top:36px;}
.login-module-chip{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:20px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  font-size:11px;color:rgba(255,255,255,.4);
}
.login-module-chip span{font-size:13px;}

.login-right{
  display:flex;align-items:center;justify-content:center;
  padding:40px;
}
.login-box{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;padding:44px 40px;width:400px;
  backdrop-filter:blur(24px);
}
.login-box-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px;}
.login-box-sub{font-size:13px;color:rgba(255,255,255,.35);margin-bottom:28px;}
.login-label{display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,.45);margin-bottom:6px;margin-top:14px;}
.login-input{
  width:100%;background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.1);border-radius:10px;
  padding:12px 14px;font-size:13px;color:#fff;
  font-family:'Poppins',sans-serif;outline:none;transition:border-color .2s;
}
.login-input:focus{border-color:var(--verde);}
.login-input::placeholder{color:rgba(255,255,255,.2);}
.login-btn{
  width:100%;background:var(--verde);color:#fff;border:none;
  border-radius:10px;padding:13px;font-size:14px;font-weight:600;
  font-family:'Poppins',sans-serif;cursor:pointer;margin-top:22px;
  transition:background .2s,transform .1s;letter-spacing:.2px;
}
.login-btn:hover{background:var(--verde-d);}
.login-btn:active{transform:scale(.99);}
.login-btn:disabled{opacity:.6;cursor:not-allowed;}
.login-err{
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
  border-radius:8px;padding:10px 12px;font-size:12px;color:#fca5a5;
  margin-top:12px;display:none;
}

/* ══ APP SHELL ══ */
#appShell{display:none;}
.shell-wrap{display:flex;height:100vh;}

/* ══ SIDEBAR ══ */
#sidebar{
  width:var(--sb-width);background:var(--sb);
  display:flex;flex-direction:column;
  height:100vh;position:fixed;left:0;top:0;z-index:100;overflow-y:auto;
}
.sb-logo{
  padding:18px 16px 14px;border-bottom:1px solid var(--sb-border);
  display:flex;align-items:center;gap:10px;
}
.sb-logo-mark{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,var(--verde),var(--verde-d));
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
}
.sb-logo-text{flex:1;min-width:0;}
.sb-logo-title{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.2px;}
.sb-logo-sub{font-size:8px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:2px;margin-top:1px;}
.sb-nav{flex:1;padding:10px 8px;}
.sb-section{font-size:9px;font-weight:700;color:rgba(255,255,255,.18);text-transform:uppercase;letter-spacing:1.5px;padding:12px 10px 5px;}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:8px;cursor:pointer;
  color:rgba(255,255,255,.42);font-size:13px;font-weight:500;
  transition:all .15s;margin-bottom:1px;user-select:none;
}
.nav-item:hover{background:var(--sb-hover);color:rgba(255,255,255,.78);}
.nav-item.active{background:rgba(154,205,50,.11);color:var(--verde);}
.ni-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.nav-badge{
  margin-left:auto;background:var(--verde);color:#fff;
  font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;
}
.sb-footer{padding:10px 8px 14px;border-top:1px solid var(--sb-border);}
.user-card{
  display:flex;align-items:center;gap:10px;padding:10px;
  border-radius:10px;cursor:pointer;transition:background .15s;
}
.user-card:hover{background:var(--sb-hover);}
.user-av{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--verde),var(--verde-d));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;flex-shrink:0;
}
.user-info{flex:1;min-width:0;}
.user-name{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{font-size:10px;color:rgba(255,255,255,.28);}
.logout-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.25);font-size:15px;padding:4px;transition:color .2s;}
.logout-btn:hover{color:#ef4444;}

/* ══ MAIN ══ */
#main{margin-left:var(--sb-width);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:0 28px;height:54px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;
  box-shadow:0 1px 0 var(--border);
}
.tb-left{display:flex;align-items:center;gap:10px;}
.tb-title{font-size:14px;font-weight:600;color:var(--text);}
.tb-right{display:flex;align-items:center;gap:6px;}
.tb-unit-badge{
  background:rgba(154,205,50,.08);border:1px solid rgba(154,205,50,.18);
  color:var(--verde-d);font-size:11px;font-weight:600;
  padding:4px 10px;border-radius:20px;
}
.notif-btn{
  position:relative;background:none;border:none;cursor:pointer;
  font-size:17px;color:var(--text-2);padding:6px 8px;border-radius:8px;
  transition:background .15s;
}
.notif-btn:hover{background:var(--bg);}
.notif-dot{position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;background:#ef4444;border:2px solid var(--card);}
.tb-user{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:8px;cursor:pointer;transition:background .15s;}
.tb-user:hover{background:var(--bg);}
.tb-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--verde),var(--verde-d));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.tb-name{font-size:13px;font-weight:600;color:var(--text);}

/* ══ CONTENT ══ */
#content{flex:1;overflow-y:auto;padding:28px;}
.view{display:none;}
.view.active{display:block;}

/* ══ PAGE HEADER ══ */
.page-hdr{margin-bottom:24px;}
.page-hdr h1{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.4px;}
.page-hdr p{font-size:13px;color:var(--text-2);margin-top:3px;}
.page-hdr-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:24px;}

/* ══ KPI ══ */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px;}
.kpi-card{
  background:var(--card);border-radius:var(--radius);
  padding:20px 22px;box-shadow:var(--shadow);
  border:1px solid var(--border);position:relative;overflow:hidden;
}
.kpi-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--kpi-color,var(--verde));}
.kpi-card::after{content:attr(data-icon);position:absolute;right:14px;top:14px;font-size:28px;opacity:.07;}
.kpi-label{font-size:10px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;}
.kpi-val{font-size:28px;font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1.2;margin:6px 0 4px;}
.kpi-sub{font-size:11px;color:var(--text-3);}

/* ══ MODULE CARDS ══ */
.modules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:24px;}
.module-card{
  background:var(--card);border-radius:var(--radius);padding:22px;
  box-shadow:var(--shadow);border:1px solid var(--border);
  cursor:pointer;transition:all .2s;text-decoration:none;display:block;
  position:relative;overflow:hidden;
}
.module-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:rgba(154,205,50,.25);}
.module-card.locked{opacity:.45;cursor:not-allowed;}
.module-card.locked:hover{transform:none;box-shadow:var(--shadow);border-color:var(--border);}
.mc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.mc-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.mc-status{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;}
.mc-status.live{background:rgba(154,205,50,.1);color:var(--verde-d);border:1px solid rgba(154,205,50,.2);}
.mc-status.soon{background:#f1f5f9;color:#94a3b8;border:1px solid #e2e8f0;}
.mc-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
.mc-desc{font-size:12px;color:var(--text-2);line-height:1.55;margin-bottom:14px;}
.mc-stats{display:flex;gap:20px;border-top:1px solid var(--border);padding-top:12px;}
.mc-stat-val{font-size:17px;font-weight:700;color:var(--text);}
.mc-stat-lbl{font-size:10px;color:var(--text-3);}

/* ══ CARD ══ */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:18px;}
.card-hdr{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-hdr h2{font-size:13px;font-weight:600;color:var(--text);}
.card-body{padding:20px;}

/* ══ TABLE ══ */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:#fafafa;padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap;}
tbody td{padding:12px 14px;border-bottom:1px solid #f7f8fa;vertical-align:middle;}
tbody tr:hover{background:#fafafa;}
tbody tr:last-child td{border-bottom:none;}

/* ══ BUTTONS ══ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--verde);color:#fff;}
.btn-primary:hover{background:var(--verde-d);}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border);}
.btn-outline:hover{border-color:#d1d5db;background:#fafafa;}
.btn-ghost{background:none;color:var(--text-2);}
.btn-ghost:hover{background:var(--bg);color:var(--text);}
.btn-danger{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;}
.btn-danger:hover{background:#fee2e2;}
.btn-sm{padding:5px 10px;font-size:12px;}

/* ══ BADGES ══ */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.bg-green{background:rgba(154,205,50,.1);color:var(--verde-d);}
.bg-blue{background:#eff6ff;color:#2563eb;}
.bg-orange{background:#fff7ed;color:#ea580c;}
.bg-red{background:#fef2f2;color:#dc2626;}
.bg-gray{background:#f1f5f9;color:#64748b;}
.bg-purple{background:#faf5ff;color:#7c3aed;}
.bg-teal{background:#f0fdfa;color:#0d9488;}

/* ══ FORMS ══ */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:12px;font-weight:600;color:var(--text-2);}
.fg input,.fg select,.fg textarea{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Poppins',sans-serif;color:var(--text);outline:none;transition:border-color .15s;background:#fff;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--verde);}
.fg input:disabled{background:#f8fafc;color:#94a3b8;}

/* ══ MODAL ══ */
#modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);z-index:1000;display:none;align-items:center;justify-content:center;}
#modalOverlay.open{display:flex;}
#modalBox{background:var(--card);border-radius:18px;width:520px;max-width:95vw;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.2);}
#modalHeader{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
#modalTitle{font-size:15px;font-weight:700;color:var(--text);}
.modal-close-btn{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-2);padding:2px;line-height:1;transition:color .15s;}
.modal-close-btn:hover{color:var(--text);}
#modalBody{padding:20px 24px;overflow-y:auto;flex:1;}
#modalFooter{padding:14px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:8px;}

/* ══ TOAST ══ */
#toast{
  position:fixed;bottom:24px;right:24px;
  background:#1e293b;color:#fff;
  padding:12px 18px;border-radius:10px;
  font-size:13px;font-weight:500;
  box-shadow:0 8px 32px rgba(0,0,0,.18);
  transform:translateY(70px);opacity:0;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  z-index:9999;display:flex;align-items:center;gap:8px;
  max-width:360px;
}
#toast.show{transform:translateY(0);opacity:1;}
#toast.success::before{content:'✓';color:var(--verde);font-weight:700;font-size:14px;}
#toast.error::before{content:'✕';color:#ef4444;font-weight:700;font-size:14px;}

/* ══ AVATAR ══ */
.av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--verde),var(--verde-d));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.av-sm{width:26px;height:26px;font-size:10px;}

/* ══ SKELETON ══ */
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;height:16px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ══ RESPONSIVE ══ */
@media(max-width:900px){
  .login-wrap{grid-template-columns:1fr;}
  .login-left{display:none;}
}
</style>
</head>
<body>

<!-- ════ LOGIN ════ -->
<div id="loginScreen">
  <div class="login-wrap">
    <div class="login-left">
      <div class="login-brand">
        <div class="login-brand-mark">🌿</div>
        <div>
          <div class="login-brand-name">Sombrear</div>
          <div class="login-brand-sub">Ecosistema</div>
        </div>
      </div>
      <h1 class="login-hero-title">Toda a operação<br>em <span>um único lugar.</span></h1>
      <p class="login-hero-sub">CRM, produção, pedidos e relatórios integrados para as unidades Sombrear DF e GO.</p>
      <div class="login-modules">
        <div class="login-module-chip"><span>🎯</span> CRM</div>
        <div class="login-module-chip"><span>🔧</span> Produção</div>
        <div class="login-module-chip"><span>📦</span> Pedidos</div>
        <div class="login-module-chip"><span>📊</span> Relatórios</div>
        <div class="login-module-chip"><span>👥</span> Usuários</div>
      </div>
    </div>

    <div class="login-right">
      <div class="login-box">
        <div class="login-box-title">Bem-vindo de volta</div>
        <div class="login-box-sub">Entre com sua conta Sombrear</div>
        <label class="login-label">E-mail</label>
        <input type="email" class="login-input" id="loginEmail" placeholder="seu@sombrear.com.br" autocomplete="email">
        <label class="login-label">Senha</label>
        <input type="password" class="login-input" id="loginSenha" placeholder="••••••••" autocomplete="current-password">
        <div class="login-err" id="loginErr"></div>
        <button class="login-btn" id="loginBtn" onclick="doLogin()">Entrar no Ecosistema</button>
      </div>
    </div>
  </div>
</div>

<!-- ════ APP SHELL ════ -->
<div id="appShell">
  <div class="shell-wrap">

    <!-- SIDEBAR -->
    <nav id="sidebar">
      <div class="sb-logo">
        <div class="sb-logo-mark">🌿</div>
        <div class="sb-logo-text">
          <div class="sb-logo-title">Sombrear</div>
          <div class="sb-logo-sub">Ecosistema</div>
        </div>
      </div>
      <div class="sb-nav" id="sidebarNav"></div>
      <div class="sb-footer">
        <div class="user-card" onclick="navigate('perfil')">
          <div class="user-av" id="sbAv">?</div>
          <div class="user-info">
            <div class="user-name" id="sbNome">—</div>
            <div class="user-role" id="sbRole">—</div>
          </div>
          <button class="logout-btn" onclick="event.stopPropagation();doLogout()" title="Sair">⏻</button>
        </div>
      </div>
    </nav>

    <!-- MAIN -->
    <div id="main">
      <div class="topbar">
        <div class="tb-left">
          <span class="tb-title" id="tbTitle">Dashboard</span>
        </div>
        <div class="tb-right">
          <span class="tb-unit-badge" id="tbUnidade">—</span>
          <button class="notif-btn" title="Notificações">🔔</button>
          <div class="tb-user" onclick="navigate('perfil')">
            <div class="tb-av" id="tbAv">?</div>
            <span class="tb-name" id="tbNome">—</span>
          </div>
        </div>
      </div>

      <div id="content">
        <div class="view" id="view-dashboard"></div>
        <div class="view" id="view-usuarios"></div>
        <div class="view" id="view-unidades"></div>
        <div class="view" id="view-perfil"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modalOverlay">
  <div id="modalBox">
    <div id="modalHeader">
      <span id="modalTitle">—</span>
      <button class="modal-close-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
    <div id="modalFooter"></div>
  </div>
</div>

async function doLogin(){
  var email = document.getElementById('loginEmail').value.trim();
  var senha = document.getElementById('loginSenha').value;
  var err   = document.getElementById('loginErr');
  var btn   = document.getElementById('loginBtn');
  err.style.display = 'none';
  if(!email||!senha){ mostrarErroLogin('Preencha e-mail e senha.'); return; }
  btn.textContent = 'Entrando...'; btn.disabled = true;
  var { data, error } = await sb.auth.signInWithPassword({ email, password:senha });
  if(error){ mostrarErroLogin('E-mail ou senha incorretos.'); btn.textContent='Entrar no Ecosistema'; btn.disabled=false; return; }
  await iniciarSessao(data.session, data.user);
}

function mostrarErroLogin(msg){
  var el = document.getElementById('loginErr');
  el.textContent = msg; el.style.display = 'block';
}

async function iniciarSessao(session, user){
  ECO.user = user;
  // Busca perfil
  var { data:perfil } = await sb.from('ecm_perfis').select('*').eq('id', user.id).single();
  if(!perfil){
    // Primeiro admin: cria perfil automaticamente
    var novoPerfil = { id:user.id, email:user.email, nome:user.email.split('@')[0], perfil:'admin', ativo:true };
    await sb.from('ecm_perfis').insert(novoPerfil);
    perfil = novoPerfil;
  }
  ECO.perfil = perfil;
  // Busca unidade
  if(perfil.unidade_id){
    var { data:un } = await sb.from('ecm_unidades').select('*').eq('id', perfil.unidade_id).single();
    ECO.unidade = un || null;
  }
  // SSO — salva sessão compartilhada para outros módulos
  salvarSSOLocal(user, perfil, session.access_token);
  // Inicia UI
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
  buildSidebar();
  navigate('dashboard');
}

function salvarSSOLocal(user, perfil, token){
  localStorage.setItem('ecm_session', JSON.stringify({
    id: user.id, email: user.email,
    nome: perfil.nome, perfil: perfil.perfil,
    unidade_id: perfil.unidade_id||null,
    unidade_nome: ECO.unidade?.nome || 'Sede Sombrear',
    access_token: token
  }));
  // SSO com SGPS — busca usuário pelo email e simula login
  conectarSGPS(user.email);
}

async function conectarSGPS(email){
  try{
    var { data } = await sb.from('sgps_store').select('value').eq('key','usuarios').single();
    if(data?.value){
      var u = data.value.find(u => u.email === email && u.ativo);
      if(u) localStorage.setItem('sombrear_session', JSON.stringify(u));
    }
  }catch(e){}
}

async function doLogout(){
  await sb.auth.signOut();
  localStorage.removeItem('ecm_session');
  localStorage.removeItem('sombrear_session');
  ECO = { user:null, perfil:null, unidade:null };
  document.getElementById('appShell').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  var btn = document.getElementById('loginBtn');
  btn.textContent = 'Entrar no Ecosistema'; btn.disabled = false;
  document.getElementById('loginErr').style.display = 'none';
  document.getElementById('loginSenha').value = '';
}

  NAV.forEach(function(n){
    if(n.admin && !isAdmin()) return;
    if(n.section && n.section !== lastSection){
      html += '<div class="sb-section">'+n.section+'</div>';

function navigate(view){

  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  var el = document.getElementById('view-'+view);
  if(el) el.classList.add('active');
  var nav = document.getElementById('nav-'+view);
  if(nav) nav.classList.add('active');
  document.getElementById('tbTitle').textContent = PAGE_TITLES[view] || view;

async function salvarNovoUsuario(){
  var nome  = (document.getElementById('nu_nome').value||'').trim();
  var email = (document.getElementById('nu_email').value||'').trim().toLowerCase();
  var senha = document.getElementById('nu_senha').value;
  var senha2= document.getElementById('nu_senha2').value;
  var cargo = (document.getElementById('nu_cargo').value||'').trim();
  var perfil= document.getElementById('nu_perfil').value;
  var unid  = document.getElementById('nu_unidade').value||null;
  if(!nome)  { showToast('Informe o nome.','error'); return; }
  if(!email||!email.includes('@')){ showToast('E-mail inválido.','error'); return; }
  if(senha.length<6){ showToast('Senha deve ter ao menos 6 caracteres.','error'); return; }
  if(senha!==senha2){ showToast('As senhas não conferem.','error'); return; }

  var { data, error } = await sbR.auth.signUp({ email, password:senha });
  if(error){ showToast('Erro: '+error.message,'error'); return; }
  var uid = data?.user?.id;
  if(!uid){ showToast('Erro ao criar conta.','error'); return; }

  var { error:pe } = await sb.from('ecm_perfis').insert({ id:uid, nome, email, cargo, perfil, unidade_id:unid, ativo:true });
  if(pe){ showToast('Conta criada mas perfil falhou: '+pe.message,'error'); return; }

  closeModal();
  showToast('Usuário '+nome+' criado!','success');
  renderUsuarios();
}

async function editarUsuario(id){
  var [{ data:u },{ data:uns }] = await Promise.all([
    sb.from('ecm_perfis').select('*').eq('id',id).single(),
    sb.from('ecm_unidades').select('*').eq('ativo',true).order('nome')
  ]);
  if(!u) return; uns=uns||[];
  var unOpts = '<option value="">Sede Sombrear</option>'+uns.map(un=>'<option value="'+un.id+'"'+(un.id===u.unidade_id?' selected':'')+'>'+esc(un.nome)+'</option>').join('');
  var pOpts  = Object.entries(PERFIL_LABELS).map(([k,v])=>'<option value="'+k+'"'+(k===u.perfil?' selected':'')+'>'+v+'</option>').join('');

  openModal('Editar — '+esc(u.nome),
    '<div class="form-grid">'+
    '<div class="fg"><label>Nome *</label><input id="eu_nome" value="'+esc(u.nome)+'"></div>'+
    '<div class="fg"><label>Cargo</label><input id="eu_cargo" value="'+esc(u.cargo||'')+'"></div>'+
    '<div class="fg" style="grid-column:1/-1"><label>E-mail</label><input value="'+esc(u.email||'')+'" disabled></div>'+
    '<div class="fg"><label>Perfil de Acesso</label><select id="eu_perfil">'+pOpts+'</select></div>'+
    '<div class="fg"><label>Unidade</label><select id="eu_unidade">'+unOpts+'</select></div>'+
    '</div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'+
    '<button class="btn btn-primary" onclick="salvarEdicaoUsuario(\''+id+'\')">Salvar</button>'
  );
}

async function salvarEdicaoUsuario(id){
  var nome  = (document.getElementById('eu_nome').value||'').trim();
  if(!nome){ showToast('Informe o nome.','error'); return; }
  var { error } = await sb.from('ecm_perfis').update({
    nome, cargo:(document.getElementById('eu_cargo').value||'').trim(),
    perfil:document.getElementById('eu_perfil').value,
    unidade_id:document.getElementById('eu_unidade').value||null
  }).eq('id',id);
  if(error){ showToast('Erro: '+error.message,'error'); return; }
  if(id===ECO.user.id){
    var { data:p } = await sb.from('ecm_perfis').select('*').eq('id',id).single();
    ECO.perfil = p; buildSidebar();
    var s = JSON.parse(localStorage.getItem('ecm_session')||'{}');
    s.nome = nome; localStorage.setItem('ecm_session', JSON.stringify(s));
  }
  closeModal(); showToast('Usuário atualizado.','success'); renderUsuarios();
}

async function toggleUsuario(id, ativo){
  await sb.from('ecm_perfis').update({ ativo:!ativo }).eq('id',id);
  showToast(ativo?'Usuário inativado.':'Usuário reativado.', 'success');
  renderUsuarios();
}

      '<td>'+esc(u.responsavel||'—')+'</td>'+
      '<td style="font-family:monospace;font-size:12px">'+esc(u.cnpj||'—')+'</td>'+
      '<td style="text-align:center"><strong>'+(contMap[u.id]||0)+'</strong></td>'+
      '<td>'+sBadge+'</td>'+
      '<td style="white-space:nowrap">'+
        '<button class="btn btn-sm btn-outline" onclick="editarUnidade(\''+u.id+'\')">✏️ Editar</button> '+
        '<button class="btn btn-sm btn-danger" onclick="excluirUnidade(\''+u.id+'\',\''+esc(u.nome)+'\')">🗑️</button>'+
      '</td>'+
    '</tr>';
  }).join()||'<tr><td colspan="6" style="text-align:center;padding:40px;color:#94a3b8">Nenhuma unidade cadastrada.</td></tr>';

  el.innerHTML =
  '<div class="page-hdr-row">'+
    '<div><h1 style="font-size:22px;font-weight:700">Unidades</h1><p style="font-size:13px;color:var(--text-2);margin-top:3px">Unidades operacionais da Sombrear.</p></div>'+
    '<button class="btn btn-primary" onclick="novaUnidade()">＋ Nova Unidade</button>'+
  '</div>'+
  '<div class="card"><div class="card-body" style="padding:0"><div class="tbl-wrap">'+
  '<table><thead><tr><th>Unidade</th><th>Responsável</th><th>CNPJ</th><th style="text-align:center">Usuários</th><th>Status</th><th></th></tr></thead>'+
  '<tbody>'+rows+'</tbody></table></div></div></div>';
}

function novaUnidade(){
  openModal('Nova Unidade',
    '<div class="form-grid">'+
    '<div class="fg" style="grid-column:1/-1"><label>Nome *</label><input id="nu2_nome" placeholder="Ex: Sombrear SP"></div>'+
    '<div class="fg"><label>Cidade</label><input id="nu2_cidade" placeholder="Ex: São Paulo"></div>'+
    '<div class="fg"><label>Estado</label><input id="nu2_estado" placeholder="SP" maxlength="2" style="text-transform:uppercase"></div>'+
    '<div class="fg"><label>Responsável</label><input id="nu2_resp" placeholder="Nome do gestor"></div>'+
    '<div class="fg"><label>CNPJ</label><input id="nu2_cnpj" placeholder="00.000.000/0001-00"></div>'+
    '<div class="fg"><label>Telefone</label><input id="nu2_tel" placeholder="(00) 00000-0000"></div>'+
    '<div class="fg" style="grid-column:1/-1"><label>E-mail</label><input type="email" id="nu2_email" placeholder="sp@sombrear.com.br"></div>'+
    '</div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'+
    '<button class="btn btn-primary" onclick="salvarNovaUnidade()">Salvar</button>'
  );
}

async function salvarNovaUnidade(){
  var nome = (document.getElementById('nu2_nome').value||'').trim();
  if(!nome){ showToast('Informe o nome.','error'); return; }
  var { error } = await sb.from('ecm_unidades').insert({
    nome, ativo:true,
    cidade:(document.getElementById('nu2_cidade').value||'').trim(),
    estado:(document.getElementById('nu2_estado').value||'').trim().toUpperCase(),
    responsavel:(document.getElementById('nu2_resp').value||'').trim(),
    cnpj:(document.getElementById('nu2_cnpj').value||'').trim(),
    telefone:(document.getElementById('nu2_tel').value||'').trim(),
    email:(document.getElementById('nu2_email').value||'').trim()
  });
  if(error){ showToast('Erro: '+error.message,'error'); return; }
  closeModal(); showToast('Unidade cadastrada!','success'); renderUnidades();
}

async function editarUnidade(id){
  var { data:u } = await sb.from('ecm_unidades').select('*').eq('id',id).single();
  if(!u) return;
  openModal('Editar — '+esc(u.nome),
    '<div class="form-grid">'+
    '<div class="fg" style="grid-column:1/-1"><label>Nome *</label><input id="eu2_nome" value="'+esc(u.nome)+'"></div>'+
    '<div class="fg"><label>Cidade</label><input id="eu2_cidade" value="'+esc(u.cidade||'')+'"></div>'+
    '<div class="fg"><label>Estado</label><input id="eu2_estado" value="'+esc(u.estado||'')+'" maxlength="2"></div>'+
    '<div class="fg"><label>Responsável</label><input id="eu2_resp" value="'+esc(u.responsavel||'')+'"></div>'+
    '<div class="fg"><label>CNPJ</label><input id="eu2_cnpj" value="'+esc(u.cnpj||'')+'"></div>'+
    '<div class="fg"><label>Telefone</label><input id="eu2_tel" value="'+esc(u.telefone||'')+'"></div>'+
    '<div class="fg"><label>E-mail</label><input type="email" id="eu2_email" value="'+esc(u.email||'')+'"></div>'+
    '<div class="fg"><label>Status</label><select id="eu2_ativo"><option value="1"'+(u.ativo?' selected':'')+'>Ativa</option><option value="0"'+(!u.ativo?' selected':'')+'>Inativa</option></select></div>'+
    '</div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'+
    '<button class="btn btn-primary" onclick="salvarEdicaoUnidade(\''+id+'\')">Salvar</button>'
  );
}

async function salvarEdicaoUnidade(id){
  var nome = (document.getElementById('eu2_nome').value||'').trim();
  if(!nome){ showToast('Informe o nome.','error'); return; }
  var { error } = await sb.from('ecm_unidades').update({
    nome,
    cidade:(document.getElementById('eu2_cidade').value||'').trim(),
    estado:(document.getElementById('eu2_estado').value||'').trim().toUpperCase(),
    responsavel:(document.getElementById('eu2_resp').value||'').trim(),
    cnpj:(document.getElementById('eu2_cnpj').value||'').trim(),
    telefone:(document.getElementById('eu2_tel').value||'').trim(),
    email:(document.getElementById('eu2_email').value||'').trim(),
    ativo:document.getElementById('eu2_ativo').value==='1'
  }).eq('id',id);
  if(error){ showToast('Erro: '+error.message,'error'); return; }
  if(ECO.perfil?.unidade_id===id){
    var { data:un } = await sb.from('ecm_unidades').select('*').eq('id',id).single();
    ECO.unidade = un; buildSidebar();
  }
  closeModal(); showToast('Unidade atualizada.','success'); renderUnidades();
}

async function excluirUnidade(id, nome){
  if(!confirm('Excluir a unidade "'+nome+'"? Usuários vinculados perderão a referência.')) return;
  await sb.from('ecm_unidades').delete().eq('id',id);
  showToast('Unidade excluída.','success'); renderUnidades();
}

// ════════════════════════════════════════════
// PERFIL PESSOAL
// ════════════════════════════════════════════
function renderPerfil(){
  var p = ECO.perfil||{};
  var un = ECO.unidade;
  document.getElementById('view-perfil').innerHTML =
  '<div class="page-hdr"><h1>Meu Perfil</h1><p>Gerencie suas informações pessoais.</p></div>'+
  '<div style="max-width:520px">'+
  '<div class="card"><div class="card-hdr"><h2>Dados Pessoais</h2></div><div class="card-body">'+
  '<div style="display:flex;align-items:center;gap:16px;margin-bottom:22px;padding:16px;background:var(--bg);border-radius:10px">'+
    '<div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--verde),var(--verde-d));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0">'+(p.nome||'?')[0].toUpperCase()+'</div>'+
    '<div>'+
      '<div style="font-size:15px;font-weight:700">'+esc(p.nome||'')+'</div>'+
      '<div style="font-size:12px;color:var(--text-2)">'+esc(p.email||'')+'</div>'+
      '<div style="margin-top:4px"><span class="badge '+(PERFIL_COR[p.perfil]||'bg-gray')+'">'+( PERFIL_LABELS[p.perfil]||p.perfil)+'</span>'+
      (un?'<span style="font-size:11px;color:var(--text-2);margin-left:8px">'+esc(un.nome)+'</span>':'')+
      '</div>'+
    '</div>'+
  '</div>'+
  '<div class="form-grid">'+
  '<div class="fg" style="grid-column:1/-1"><label>Nome completo *</label><input id="mp_nome" value="'+esc(p.nome||'')+'"></div>'+
  '<div class="fg" style="grid-column:1/-1"><label>Cargo</label><input id="mp_cargo" value="'+esc(p.cargo||'')+'"></div>'+
  '<div class="fg" style="grid-column:1/-1"><label>Nova Senha <span style="font-size:10px;color:#94a3b8;font-weight:400">(deixe em branco para manter)</span></label>'+
    '<input type="password" id="mp_senha" placeholder="Nova senha..."></div>'+
  '</div>'+
  '<div style="margin-top:18px;text-align:right"><button class="btn btn-primary" onclick="salvarPerfil()">Salvar Perfil</button></div>'+
  '</div></div></div>';
}

async function salvarPerfil(){
  var nome  = (document.getElementById('mp_nome').value||'').trim();
  var cargo = (document.getElementById('mp_cargo').value||'').trim();
  var senha = document.getElementById('mp_senha').value;
  if(!nome){ showToast('Informe o nome.','error'); return; }
  var { error } = await sb.from('ecm_perfis').update({ nome, cargo }).eq('id', ECO.user.id);
  if(error){ showToast('Erro ao salvar.','error'); return; }
  if(senha){
    var { error:se } = await sb.auth.updateUser({ password:senha });
    if(se){ showToast('Dados salvos mas erro na senha: '+se.message,'error'); return; }
  }
  ECO.perfil.nome = nome; ECO.perfil.cargo = cargo;
  var s = JSON.parse(localStorage.getItem('ecm_session')||'{}');
  s.nome = nome; localStorage.setItem('ecm_session', JSON.stringify(s));
  buildSidebar(); showToast('Perfil atualizado!','success');
}

// ════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════
function openModal(title, body, footer){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML   = body;
  document.getElementById('modalFooter').innerHTML = footer||'';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(function(){ var f=document.querySelector('#modalBody input:not([disabled])'); if(f)f.focus(); }, 100);
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });

// ════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════
var _tt;
function showToast(msg, type){
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show '+(type||'');
  clearTimeout(_tt); _tt = setTimeout(()=>el.className='', 3500);
}

// ════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtMoeda(v){ return 'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2}); }

// Enter no login
document.getElementById('loginSenha').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('loginEmail').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('loginSenha').focus(); });

// ════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════
(async function boot(){
  var { data:{ session } } = await sb.auth.getSession();
  if(session?.user) await iniciarSessao(session, session.user);
  sb.auth.onAuthStateChange(async (event, session)=>{
    if(event==='SIGNED_OUT'){
      document.getElementById('appShell').style.display='none';
      document.getElementById('loginScreen').style.display='flex';
    }
  });
})();
</script>
</body>
</html>
